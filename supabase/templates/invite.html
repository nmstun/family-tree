<!DOCTYPE html>
<html lang="ja">
  <body style="margin: 0; padding: 0; background-color: #f9fafb; font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding: 32px 16px;">
      <tr>
        <td align="center">
          <table
            width="480"
            cellpadding="0"
            cellspacing="0"
            style="background-color: #ffffff; border-radius: 12px; padding: 32px; max-width: 480px;"
          >
            <tr>
              <td style="font-size: 20px; font-weight: 700; color: #111827; padding-bottom: 16px;">
                🌳 家系図アプリへの招待
              </td>
            </tr>
            <tr>
              <td style="font-size: 14px; color: #374151; line-height: 1.7; padding-bottom: 24px;">
                {{ .Data.inviter_email }} さんから、家系図「{{ .Data.tree_name }}」の共同編集に招待されました。<br />
                下のボタンからログインすると、そのまま家系図の閲覧・編集を始められます。
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom: 24px;">
                <a
                  href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=invite&next=/"
                  style="display: inline-block; background-color: #4f46e5; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 600; padding: 12px 28px; border-radius: 8px;"
                >
                  招待を受けて家系図を開く
                </a>
              </td>
            </tr>
            <tr>
              <td style="font-size: 12px; color: #9ca3af; line-height: 1.6; border-top: 1px solid #e5e7eb; padding-top: 16px;">
                このリンクは一定時間で無効になります。心当たりがない場合は、このメールを無視してください。
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
